<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Devenir chauffeur - Foodza</title>
<a href="index.html">⬅ Retour</a>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-box {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #00c853;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00a844;
    }

    #success {
      display: none;
      text-align: center;
      color: green;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="form-box">
  <h2>🚗 Devenir partenaire</h2>

 <form action="https://formspree.io/f/TON_ID" method="POST"></form>
    <input type="text" placeholder="Nom complet" required>
    <input type="tel" placeholder="Téléphone" required>
    <input type="text" placeholder="Ville" required>

    <button type="submit">Envoyer</button>
  </form>

  <p id="success">✅ Demande envoyée !</p>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>
